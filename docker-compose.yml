services:
  api:
    build: .
    container_name: catalog-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - /usr/src/app
      - /usr/src/app/node_modules
      - sqlite_data:/usr/src/app/prisma
    command: sh -c "npx prisma db push && npm run dev"

volumes:
  sqlite_data:
